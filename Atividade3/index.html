<script>
  let n1 = parseFloat(prompt("Nota do primeiro bimestre:"));
  let n2 = parseFloat(prompt("Nota do segundo bimestre:"));
  let n3 = parseFloat(prompt("Nota do terceiro bimestre:"));

  let media = (n1 + n2 + n3) / 3;

  alert("Média: " + media);

  let n4 = parseFloat(prompt("Número um:"));
  let n5 = parseFloat(prompt("Número dois:"));

  alert("Soma: " + (n4 + n5));
  alert("Subtração: " + (n4 - n5));
  alert("Multiplicação: " + n4 * n5);
  alert("Divisão: " + n4 / n5);
  alert("Resto da divisão: " + (n4 % n5));
</script>
