<!DOCTYPE html lang ="pt-br">
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Pedra, Papel e Tesoura</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <body id="tudo">
    <div class="container-fluid p-5 bg-primary text-white text-center">
      <h1>Pedra, Papel e Tesoura</h1>
      <p>Jogue contra o computador!</p>
    </div>
    <button type="button" id="Butao" onclick="jogar()">
      Aperte aqui para jogar pedra
    </button>
  </body>
</html>
<style>
  #tudo {
    text-align: center;
    background-color: rgb(45, 138, 201);
  }
  #Butao {
    background-color: rgb(21, 218, 224);
    color: black;
    padding: 30px 64px;
    text-align: center;
    text-decoration: none;
    display: inline-block;
    font-size: 32px;
    margin: 4px 2px;
  }
</style>
<script>
  function jogar() {
    var escolha = prompt("Escolha pedra, papel ou tesoura:");
    var opcoes = ["pedra", "papel", "tesoura"];
    var escolhaCom = opcoes[Math.floor(Math.random() * opcoes.length)];
    // Meus agradecimentos ao W3schools.     https://www.w3schools.com/Js/js_random.asp

    if (escolha === escolhaCom) {
      alert("Empate, o computador escolheu " + escolhaCom);
    } else if (
      (escolha === "pedra" && escolhaCom === "tesoura") ||
      (escolha === "papel" && escolhaCom === "pedra") ||
      (escolha === "tesoura" && escolhaCom === "papel")
    ) {
      alert("Você ganhou! O computador escolheu " + escolhaCom);
    } else {
      alert("Você perdeu! O computador escolheu " + escolhaCom);
    }
  }
</script>
